<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="gTitle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>
    <linearGradient id="gTermBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001a00"/>
      <stop offset="100%" stop-color="#000800"/>
    </linearGradient>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="4" height="2" fill="#000" fill-opacity="0.35"/>
    </pattern>
    <pattern id="grid" width="80" height="48" patternUnits="userSpaceOnUse" x="60" y="58">
      <path d="M80 0L0 0 0 48" fill="none" stroke="#00ff41" stroke-width="0.4" opacity="0.06"/>
      <path d="M16 0L16 48 M32 0L32 48 M48 0L48 48 M64 0L64 48 M0 12L80 12 M0 24L80 24 M0 36L80 36" fill="none" stroke="#00ff41" stroke-width="0.2" opacity="0.03"/>
    </pattern>
    <clipPath id="clipGuest">
      <rect x="118" y="96" width="0" height="16">
        <animate attributeName="width" values="0;7;14;21;28;35" keyTimes="0;0.2;0.4;0.6;0.8;1" calcMode="discrete" begin="1.0s" dur="0.5s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="clipPass">
      <rect x="138" y="114" width="0" height="16">
        <animate attributeName="width" values="0;7;14;21;28;35;42;49;56" keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1" calcMode="discrete" begin="1.8s" dur="0.45s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="clipCmd">
      <rect x="85" y="178" width="0" height="16">
        <animate attributeName="width" values="0;7;14;21;28;35;42;49;56" keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1" calcMode="discrete" begin="3.2s" dur="0.45s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>
  <style>
    @keyframes jitter {
      0%   { transform: translate(0, 0); }
      10%  { transform: translate(0.6px, -0.4px); }
      20%  { transform: translate(-0.5px, 0.3px); }
      30%  { transform: translate(0.3px, -0.6px); }
      40%  { transform: translate(-0.7px, -0.2px); }
      50%  { transform: translate(0.4px, 0.5px); }
      60%  { transform: translate(-0.3px, -0.3px); }
      70%  { transform: translate(0.5px, 0.2px); }
      80%  { transform: translate(-0.6px, 0.4px); }
      90%  { transform: translate(0.2px, -0.5px); }
      100% { transform: translate(0, 0); }
    }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes fadeShow { to { opacity: 1; } }
    @keyframes pulse { 0%,100%{opacity:0.25} 50%{opacity:0.8} }
    @keyframes glowPulse { 0%,100%{opacity:0.15} 50%{opacity:0.5} }

    .jitter { animation: jitter 0.15s linear infinite; }
    .blink { animation: blink 0.8s step-end infinite; }
    .boot1 { opacity: 0; animation: fadeShow 0.15s 0.5s forwards; }
    .boot2 { opacity: 0; animation: fadeShow 0.15s 0.8s forwards; }
    .login-label { opacity: 0; animation: fadeShow 0.15s 1.0s forwards; }
    .pass-label { opacity: 0; animation: fadeShow 0.15s 1.8s forwards; }
    .login-ok { opacity: 0; animation: fadeShow 0.2s 2.5s forwards; }
    .motd { opacity: 0; animation: fadeShow 0.15s 2.8s forwards; }
    .prompt { opacity: 0; animation: fadeShow 0.15s 3.2s forwards; }
    .logo-group { opacity: 0; animation: fadeShow 0.6s 4.0s forwards; }
    .sysinfo1 { opacity: 0; animation: fadeShow 0.15s 5.0s forwards; }
    .sysinfo2 { opacity: 0; animation: fadeShow 0.15s 5.15s forwards; }
    .sysinfo3 { opacity: 0; animation: fadeShow 0.15s 5.3s forwards; }
    .sysinfo4 { opacity: 0; animation: fadeShow 0.15s 5.45s forwards; }
    .sysinfo5 { opacity: 0; animation: fadeShow 0.15s 5.6s forwards; }
    .sysinfo6 { opacity: 0; animation: fadeShow 0.15s 5.75s forwards; }
    .fprompt { opacity: 0; animation: fadeShow 0.15s 6.5s forwards; }
    .cursor { animation: fadeShow 0.01s 6.5s forwards, blink 0.8s 6.5s step-end infinite; opacity:0; }
    .pd0  { animation: pulse 2s ease-in-out infinite; }
    .pd1  { animation: pulse 2s ease-in-out 1s infinite; }
    .pd05 { animation: pulse 2s ease-in-out 0.5s infinite; }
    .pd15 { animation: pulse 2s ease-in-out 1.5s infinite; }
    .glow  { animation: glowPulse 3s ease-in-out infinite; }
  </style>

