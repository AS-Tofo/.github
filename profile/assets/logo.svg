<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="gTitle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#252525"/>
    </linearGradient>
    <linearGradient id="gTermBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001a00"/>
      <stop offset="100%" stop-color="#000a00"/>
    </linearGradient>

    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="4" height="2" fill="#000" fill-opacity="0.35"/>
    </pattern>

    <pattern id="grid" width="80" height="48" patternUnits="userSpaceOnUse" x="60" y="58">
      <path d="M80 0L0 0 0 48" fill="none" stroke="#00ff41" stroke-width="0.4" opacity="0.1"/>
      <path d="M16 0L16 48 M32 0L32 48 M48 0L48 48 M64 0L64 48
               M0 12L80 12 M0 24L80 24 M0 36L80 36" fill="none" stroke="#00ff41" stroke-width="0.2" opacity="0.05"/>
    </pattern>

  </defs>

  <style>
    @keyframes jitter {
      0%   { transform: translate(0, 0); }
      10%  { transform: translate(0.6px, -0.4px); }
      20%  { transform: translate(-0.5px, 0.3px); }
      30%  { transform: translate(0.3px, -0.6px); }
      40%  { transform: translate(-0.7px, -0.2px); }
      50%  { transform: translate(0.4px, 0.5px); }
      60%  { transform: translate(-0.3px, -0.3px); }
      70%  { transform: translate(0.5px, 0.2px); }
      80%  { transform: translate(-0.6px, 0.4px); }
      90%  { transform: translate(0.2px, -0.5px); }
      100% { transform: translate(0, 0); }
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.8; }
    }
    .jitter { animation: jitter 0.15s linear infinite; }
    .blink { animation: blink 1s step-end infinite; }
    .fade1 { opacity: 0; animation: fadeIn 0.3s 1.2s forwards; }
    .fade2 { opacity: 0; animation: fadeIn 0.3s 2.2s forwards; }
    .fade3 { opacity: 0; animation: fadeIn 0.3s 3.2s forwards; }
    .pd0  { animation: pulse 2s ease-in-out infinite; }
    .pd1  { animation: pulse 2s ease-in-out 1s infinite; }
    .pd05 { animation: pulse 2s ease-in-out 0.5s infinite; }
    .pd15 { animation: pulse 2s ease-in-out 1.5s infinite; }
  </style>

  <rect width="800" height="500" fill="#000a00"/>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Y2K corner brackets -->
  <g stroke="#00ff41" stroke-width="1.5" fill="none" opacity="0.1">
    <polyline points="38,58 38,38 58,38"/>
    <polyline points="762,58 762,38 742,38"/>
    <polyline points="38,442 38,462 58,462"/>
    <polyline points="762,442 762,462 742,462"/>
  </g>

  <!-- Terminal drop shadow -->
  <rect x="57" y="23" width="660" height="440" rx="3" fill="#000" opacity="0.5"/>

  <!-- Terminal frame -->
  <rect x="50" y="15" width="660" height="440" rx="3" fill="#2a2a2a"/>

  <!-- Terminal inner border -->
  <rect x="53" y="18" width="654" height="434" rx="2" fill="#001a00"/>

  <!-- Title bar -->
  <path d="M55 20 L55 28 Q55 20 58 20 L700 20 Q703 20 703 28 L703 50 L55 50 Z" fill="url(#gTitle)"/>
  <rect x="55" y="36" width="648" height="14" fill="url(#gTitle)"/>

  <!-- Title bar buttons -->
  <circle cx="71" cy="35" r="5" fill="#ff5f57"/>
  <circle cx="87" cy="35" r="5" fill="#febc2e"/>
  <circle cx="103" cy="35" r="5" fill="#28c840"/>

  <!-- Title text -->
  <text x="380" y="38" text-anchor="middle" font-family="'Courier New', Consolas, monospace" font-size="10" fill="#999">CH1 █ AS-Tofo  —  1 V/div  —  50 ms/div</text>

  <!-- Content area background -->
  <rect x="56" y="51" width="648" height="398" fill="url(#gTermBg)"/>
  <rect x="56" y="51" width="648" height="398" fill="url(#scanlines)"/>

  <!-- Graticule edge ticks -->
  <g stroke="#00ff41" fill="none" opacity="0.25">
    <!-- Top edge ticks (major every 80px, minor every 16px) -->
    <line x1="60" y1="51" x2="60" y2="56" stroke-width="0.8"/>
    <line x1="140" y1="51" x2="140" y2="56" stroke-width="0.8"/>
    <line x1="220" y1="51" x2="220" y2="56" stroke-width="0.8"/>
    <line x1="300" y1="51" x2="300" y2="56" stroke-width="0.8"/>
    <line x1="380" y1="51" x2="380" y2="58" stroke-width="1"/>
    <line x1="460" y1="51" x2="460" y2="56" stroke-width="0.8"/>
    <line x1="540" y1="51" x2="540" y2="56" stroke-width="0.8"/>
    <line x1="620" y1="51" x2="620" y2="56" stroke-width="0.8"/>
    <line x1="700" y1="51" x2="700" y2="56" stroke-width="0.8"/>
    <line x1="76" y1="51" x2="76" y2="53" stroke-width="0.4"/>
    <line x1="92" y1="51" x2="92" y2="53" stroke-width="0.4"/>
    <line x1="108" y1="51" x2="108" y2="53" stroke-width="0.4"/>
    <line x1="124" y1="51" x2="124" y2="53" stroke-width="0.4"/>
    <line x1="156" y1="51" x2="156" y2="53" stroke-width="0.4"/>
    <line x1="172" y1="51" x2="172" y2="53" stroke-width="0.4"/>
    <line x1="188" y1="51" x2="188" y2="53" stroke-width="0.4"/>
    <line x1="204" y1="51" x2="204" y2="53" stroke-width="0.4"/>
    <!-- Bottom edge ticks (major every 80px) -->
    <line x1="60" y1="449" x2="60" y2="444" stroke-width="0.8"/>
    <line x1="140" y1="449" x2="140" y2="444" stroke-width="0.8"/>
    <line x1="220" y1="449" x2="220" y2="444" stroke-width="0.8"/>
    <line x1="300" y1="449" x2="300" y2="444" stroke-width="0.8"/>
    <line x1="380" y1="449" x2="380" y2="442" stroke-width="1"/>
    <line x1="460" y1="449" x2="460" y2="444" stroke-width="0.8"/>
    <line x1="540" y1="449" x2="540" y2="444" stroke-width="0.8"/>
    <line x1="620" y1="449" x2="620" y2="444" stroke-width="0.8"/>
    <line x1="700" y1="449" x2="700" y2="444" stroke-width="0.8"/>
    <!-- Left edge ticks (major every 48px, minor every 12px) -->
    <line x1="56" y1="58" x2="61" y2="58" stroke-width="0.8"/>
    <line x1="56" y1="106" x2="61" y2="106" stroke-width="0.8"/>
    <line x1="56" y1="154" x2="61" y2="154" stroke-width="0.8"/>
    <line x1="56" y1="202" x2="61" y2="202" stroke-width="0.8"/>
    <line x1="56" y1="250" x2="63" y2="250" stroke-width="1"/>
    <line x1="56" y1="298" x2="61" y2="298" stroke-width="0.8"/>
    <line x1="56" y1="346" x2="61" y2="346" stroke-width="0.8"/>
    <line x1="56" y1="394" x2="61" y2="394" stroke-width="0.8"/>
    <line x1="56" y1="442" x2="61" y2="442" stroke-width="0.8"/>
    <line x1="56" y1="70" x2="58" y2="70" stroke-width="0.4"/>
    <line x1="56" y1="82" x2="58" y2="82" stroke-width="0.4"/>
    <line x1="56" y1="94" x2="58" y2="94" stroke-width="0.4"/>
    <line x1="56" y1="118" x2="58" y2="118" stroke-width="0.4"/>
    <line x1="56" y1="130" x2="58" y2="130" stroke-width="0.4"/>
    <line x1="56" y1="142" x2="58" y2="142" stroke-width="0.4"/>
    <!-- Right edge ticks (major every 48px) -->
    <line x1="704" y1="58" x2="699" y2="58" stroke-width="0.8"/>
    <line x1="704" y1="106" x2="699" y2="106" stroke-width="0.8"/>
    <line x1="704" y1="154" x2="699" y2="154" stroke-width="0.8"/>
    <line x1="704" y1="202" x2="699" y2="202" stroke-width="0.8"/>
    <line x1="704" y1="250" x2="697" y2="250" stroke-width="1"/>
    <line x1="704" y1="298" x2="699" y2="298" stroke-width="0.8"/>
    <line x1="704" y1="346" x2="699" y2="346" stroke-width="0.8"/>
    <line x1="704" y1="394" x2="699" y2="394" stroke-width="0.8"/>
    <line x1="704" y1="442" x2="699" y2="442" stroke-width="0.8"/>
  </g>

  <!-- Graticule labels -->
  <g font-family="'Courier New', Consolas, monospace" font-size="8" fill="#00ff41" opacity="0.4">
    <text x="64" y="68">CH1</text>
    <text x="64" y="442">1 V/div</text>
    <text x="630" y="442">50 ms/div</text>
  </g>

  <!-- Neofetch prompt -->
  <text x="72" y="72" font-family="'Courier New', Consolas, monospace" font-size="11">
    <tspan fill="#0f0">$ </tspan><tspan fill="#00ff41">neofetch</tspan>
  </text>

  <!-- Oscilloscope trace lines -->
  <g stroke="#00ff41" fill="none" opacity="0.05">
    <line x1="66" y1="100" x2="694" y2="100" stroke-width="0.5"/>
    <line x1="66" y1="380" x2="694" y2="380" stroke-width="0.5"/>
    <path d="M66 240 Q160 190 260 240 Q360 290 460 240 Q560 190 660 240 Q680 230 694 240" stroke-width="0.5"/>
    <circle cx="300" cy="100" r="1.5" fill="#00ff41" opacity="0.3"/>
    <circle cx="500" cy="100" r="1.5" fill="#00ff41" opacity="0.3"/>
    <circle cx="150" cy="380" r="1.5" fill="#00ff41" opacity="0.3"/>
    <circle cx="600" cy="380" r="1.5" fill="#00ff41" opacity="0.3"/>
  </g>

  <!-- Logo: 3D Crystal "A" + Signal "S" Trace -->
  <g transform="translate(380, 240)">
    <g transform="translate(-102, 0)" class="jitter">

      <!-- Back outline (offset 14,-8) - dimmer extrusion depth -->
      <path d="M -26,37 L 14,-53 L 54,37 M 42,4 L 30,-15 L 14,-30 L -2,-15 L -10,4"
            fill="none" stroke="#00ff41" stroke-width="0.6" stroke-opacity="0.2"/>

      <!-- Extrusion edges (front to back) -->
      <g stroke="#00ff41" stroke-width="0.6" stroke-opacity="0.3">
        <line x1="-40" y1="45" x2="-26" y2="37"/>
        <line x1="0" y1="-45" x2="14" y2="-53"/>
        <line x1="40" y1="45" x2="54" y2="37"/>
        <line x1="-26" y1="12" x2="-10" y2="4"/>
        <line x1="26" y1="12" x2="42" y2="4"/>
      </g>

      <!-- Front face: A shape with inner cutout -->
      <path d="M -40,45 L 0,-45 L 40,45 L 26,12 L 14,-5 L 0,-20 L -14,-5 L -26,12 Z"
            fill="#001a00" fill-opacity="0.5" stroke="#00ff41" stroke-width="1.2" stroke-opacity="0.85" stroke-linejoin="round"/>

      <!-- Internal facet subdivision lines -->
      <g stroke="#00ff41" stroke-width="0.5" stroke-opacity="0.35">
        <line x1="-26" y1="12" x2="0" y2="-20"/>
        <line x1="26" y1="12" x2="0" y2="-20"/>
        <line x1="-26" y1="12" x2="26" y2="12"/>
        <line x1="0" y1="-20" x2="0" y2="-45"/>
      </g>

      <!-- S-curve signal trace -->
      <path d="M 55,-40 C 90,-45 95,-5 65,0 C 45,5 35,15 50,30 C 60,40 85,42 75,38"
            fill="none" stroke="#00ff41" stroke-width="2.5" stroke-opacity="0.9" stroke-linecap="round"/>

      <!-- === TOFO letters === -->

      <!-- T crystal -->
      <path d="M 100,-39 L 124,-39 L 124,-29 L 119,-29 L 119,31 L 105,31 L 105,-29 L 100,-29 Z"
            fill="none" stroke="#00ff41" stroke-width="0.5" stroke-opacity="0.2"/>
      <g stroke="#00ff41" stroke-width="0.5" stroke-opacity="0.25">
        <line x1="93" y1="-35" x2="100" y2="-39"/><line x1="117" y1="-35" x2="124" y2="-39"/>
        <line x1="112" y1="35" x2="119" y2="31"/><line x1="98" y1="35" x2="105" y2="31"/>
      </g>
      <path d="M 93,-35 L 117,-35 L 117,-25 L 112,-25 L 112,35 L 98,35 L 98,-25 L 93,-25 Z"
            fill="#001a00" fill-opacity="0.4" stroke="#00ff41" stroke-width="0.9" stroke-opacity="0.7" stroke-linejoin="round"/>

      <!-- O ring (Lissajous circle) -->
      <circle cx="150" cy="-3" r="16" fill="none" stroke="#00ff41" stroke-width="0.5" stroke-opacity="0.2"/>
      <circle cx="145" cy="0" r="16" fill="none" stroke="#00ff41" stroke-width="1" stroke-opacity="0.7"/>
      <g stroke="#00ff41" stroke-width="0.4" stroke-opacity="0.2">
        <line x1="161" y1="0" x2="166" y2="-3"/><line x1="129" y1="0" x2="134" y2="-3"/>
        <line x1="145" y1="-16" x2="150" y2="-19"/><line x1="145" y1="16" x2="150" y2="13"/>
      </g>

      <!-- F crystal -->
      <path d="M 179,-39 L 207,-39 L 207,-29 L 186,-29 L 186,-9 L 202,-9 L 202,-1 L 186,-1 L 186,31 L 179,31 Z"
            fill="none" stroke="#00ff41" stroke-width="0.5" stroke-opacity="0.2"/>
      <g stroke="#00ff41" stroke-width="0.5" stroke-opacity="0.25">
        <line x1="172" y1="-35" x2="179" y2="-39"/><line x1="200" y1="-35" x2="207" y2="-39"/>
        <line x1="195" y1="-5" x2="202" y2="-9"/><line x1="179" y1="35" x2="186" y2="31"/>
        <line x1="172" y1="35" x2="179" y2="31"/>
      </g>
      <path d="M 172,-35 L 200,-35 L 200,-25 L 179,-25 L 179,-5 L 195,-5 L 195,3 L 179,3 L 179,35 L 172,35 Z"
            fill="#001a00" fill-opacity="0.4" stroke="#00ff41" stroke-width="0.9" stroke-opacity="0.7" stroke-linejoin="round"/>

      <!-- O ring (Lissajous circle) -->
      <circle cx="233" cy="-3" r="16" fill="none" stroke="#00ff41" stroke-width="0.5" stroke-opacity="0.2"/>
      <circle cx="228" cy="0" r="16" fill="none" stroke="#00ff41" stroke-width="1" stroke-opacity="0.7"/>
      <g stroke="#00ff41" stroke-width="0.4" stroke-opacity="0.2">
        <line x1="244" y1="0" x2="249" y2="-3"/><line x1="212" y1="0" x2="217" y2="-3"/>
        <line x1="228" y1="-16" x2="233" y2="-19"/><line x1="228" y1="16" x2="233" y2="13"/>
      </g>

      <!-- Glow dots at structural vertices -->
      <g fill="#00ff41">
        <!-- A vertices -->
        <circle cx="-40" cy="45" r="2.5" opacity="0.9"/>
        <circle cx="0" cy="-45" r="2.5" opacity="0.9"/>
        <circle cx="40" cy="45" r="2.5" opacity="0.9"/>
        <circle cx="-26" cy="12" r="1.8" opacity="0.7"/>
        <circle cx="26" cy="12" r="1.8" opacity="0.7"/>
        <circle cx="0" cy="-20" r="1.8" opacity="0.7"/>
        <!-- S endpoints -->
        <circle cx="55" cy="-40" r="1.8" opacity="0.75"/>
        <circle cx="75" cy="38" r="1.8" opacity="0.75"/>
        <!-- T corners -->
        <circle cx="93" cy="-35" r="1.6" opacity="0.7"/>
        <circle cx="117" cy="-35" r="1.6" opacity="0.7"/>
        <circle cx="112" cy="35" r="1.6" opacity="0.7"/>
        <circle cx="98" cy="35" r="1.6" opacity="0.7"/>
        <!-- O top/bottom -->
        <circle cx="145" cy="-16" r="1.4" opacity="0.65"/>
        <circle cx="145" cy="16" r="1.4" opacity="0.65"/>
        <circle cx="161" cy="0" r="1.4" opacity="0.65"/>
        <circle cx="129" cy="0" r="1.4" opacity="0.65"/>
        <!-- F corners -->
        <circle cx="172" cy="-35" r="1.6" opacity="0.7"/>
        <circle cx="200" cy="-35" r="1.6" opacity="0.7"/>
        <circle cx="179" cy="35" r="1.6" opacity="0.7"/>
        <circle cx="172" cy="35" r="1.6" opacity="0.7"/>
        <!-- O top/bottom -->
        <circle cx="228" cy="-16" r="1.4" opacity="0.65"/>
        <circle cx="228" cy="16" r="1.4" opacity="0.65"/>
        <circle cx="244" cy="0" r="1.4" opacity="0.65"/>
        <circle cx="212" cy="0" r="1.4" opacity="0.65"/>
      </g>

    </g>
  </g>

  <!-- Status lines -->
  <text x="72" y="390" font-family="'Courier New', Consolas, monospace" font-size="11" class="fade1">
    <tspan fill="#0f0">$ </tspan><tspan fill="#00ff41">cat</tspan><tspan fill="#66ff99"> /etc/motto</tspan>
  </text>
  <text x="72" y="408" font-family="'Courier New', Consolas, monospace" font-size="11" class="fade2">
    <tspan fill="#448844">  3141 = </tspan><tspan fill="#00ff41">T</tspan><tspan fill="#448844">hree </tspan><tspan fill="#00ff41">O</tspan><tspan fill="#448844">ne </tspan><tspan fill="#00ff41">F</tspan><tspan fill="#448844">our </tspan><tspan fill="#00ff41">O</tspan><tspan fill="#448844">ne</tspan>
  </text>
  <text x="72" y="426" font-family="'Courier New', Consolas, monospace" font-size="11" class="fade3">
    <tspan fill="#0f0">$ </tspan><tspan class="blink" fill="#0f0">█</tspan>
  </text>

  <!-- Corner glowing dots -->
  <circle cx="80" cy="64" r="2.5" fill="#00ff41" class="pd0"/>
  <circle cx="720" cy="64" r="2.5" fill="#00ff41" class="pd1"/>
  <circle cx="80" cy="436" r="2.5" fill="#00ff41" class="pd05"/>
  <circle cx="720" cy="436" r="2.5" fill="#00ff41" class="pd15"/>
</svg>
